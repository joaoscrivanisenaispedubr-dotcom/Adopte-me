<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PET</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/Cadastro_alterar_listagem.css}">

</head>
<body>
<div th:replace="~{fragments/menu.html :: menu}"></div>
<main>
    <div class="card">
        <h2>Cadastro de PET</h2>
        <form id="form-cadastro" th:action="@{/pet/salvar}" th:object="${pet}" method="post" enctype="multipart/form-data">

            <div class="form-grid">

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" required th:field="*{nome}">
                </div>

                <div class="form-group">
                    <label>Idade</label>
                    <input type="text" id="idade" required th:field="*{idade}">
                </div>

                <div class="form-group">
                    <label>Raça</label>
                    <input type="text" id="raca" th:field="*{raca}">
                </div>

                <div class="form-group">
                    <label>Característica: </label>
                    <input type="text" id="raca" th:field="*{caracteristica}">
                </div>

                <div class="form-group">
                    <label>Foto:</label>
                    <input type="file" name="arquivoFoto" accept="image/*">
                </div>

            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/pet/listagem}" class="btn btn-alter">Voltar para Lista</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
