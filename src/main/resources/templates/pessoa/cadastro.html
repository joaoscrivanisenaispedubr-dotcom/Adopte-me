<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pessoa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/Cadastro_alterar_listagem.css}">

</head>
<body>
<main>
    <div class="card">
        <h2>Cadastro de Pessoa</h2>
        <form id="form-cadastro" th:action="@{/pessoa/salvar}" th:object="${pessoa}" method="post" enctype="multipart/form-data">

            <div class="form-grid">

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" required th:field="*{nome}">
                </div>

                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" id="cpf" required th:field="*{cpf}">
                </div>

                <div class="form-group">
                    <label>RG</label>
                    <input type="text" id="rg" th:field="*{rg}">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required th:field="*{email}">
                </div>

                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="data_nascimento" th:field="*{data_nasc}">
                </div>

                <div class="form-group">
                    <label>Salário</label>
                    <input type="number" id="salario" step="0.01" th:field="*{salario}">
                </div>

                <div class="form-group">
                    <label>Comprovante de Residência</label>
                    <input type="number" id="comp_res" step="0.01" th:field="*{comprov_residen}">
                </div>

                <div class="form-group">
                    <label>Foto:</label>
                    <input type="file" name="arquivoFoto" accept="image/*">
                </div>

            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/pessoa/listagem}" class="btn btn-alter">Voltar para Lista</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
